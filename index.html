<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Compliance Checker</title>
    <!-- Tailwind CSS via CDN + custom styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .premium-shadow {
            box-shadow: 0 20px 40px -10px rgba(0, 20, 30, 0.3), 0 8px 20px -8px rgba(0, 40, 60, 0.2);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-900 via-purple-800 to-pink-700 flex items-center justify-center p-6">
    <div class="w-full max-w-xl">
        <!-- Main Card -->
        <div class="glass-card premium-shadow rounded-3xl p-8 text-white">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-blue-100">
                    GST Compliance
                </h1>
                <p class="text-indigo-100 mt-2 text-lg">Enter GSTIN to fetch compliance report</p>
            </div>

            <!-- Flash messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="mb-4 p-4 rounded-xl {% if category == 'error' %}bg-red-500/30 border border-red-400/50{% else %}bg-green-500/30 border border-green-400/50{% endif %} backdrop-blur-sm text-sm">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" class="space-y-6">
                <div>
                    <label for="gstin" class="block text-sm font-medium text-indigo-100 mb-2">GSTIN</label>
                    <input type="text" name="gstin" id="gstin" 
                           placeholder="e.g., 08BYNPD9659J1ZN" 
                           class="w-full px-5 py-4 bg-white/10 border border-white/20 rounded-2xl text-white placeholder-indigo-200/60 focus:outline-none focus:ring-2 focus:ring-white/50 transition duration-200"
                           required maxlength="15" pattern="[A-Z0-9]{15}" title="15 characters (letters and numbers)">
                </div>
                <button type="submit" 
                        class="w-full bg-gradient-to-r from-amber-400 to-orange-500 hover:from-amber-500 hover:to-orange-600 text-gray-900 font-semibold py-4 rounded-2xl transition duration-300 transform hover:scale-[1.02] premium-shadow">
                    Check Compliance
                </button>
            </form>

            <div class="mt-8 text-xs text-indigo-200/60 text-center">
                Powered by ClearTax API • Premium Design
            </div>
        </div>
    </div>
</body>
</html>
